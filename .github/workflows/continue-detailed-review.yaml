name: Continue Detailed Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detailed-code-review:
    name: Continue Detailed Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run Detailed PR Review
        uses: continuedev/continue/actions/detailed-review@1ac8d45f9e3e3eb2d4b79edf7ee3b457a59c5145
        with:
          continue-api-key: ${{ secrets.CONTINUE_API_KEY }}
          continue-org: continuedev
          continue-config: continuedev/review-bot
